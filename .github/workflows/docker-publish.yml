name: Publish Docker image

# Builds and publishes the syncer to GitHub Container Registry (ghcr.io):
#   ghcr.io/<owner>/polygraphvault-sync — the Nextcloud-to-PolyGraphRAG syncer
# Runs on every push to main (tagged `latest`) and on version tags like v1.2.3
# (tagged `1.2.3` and `1.2`). Authenticates with the workflow's own GITHUB_TOKEN —
# no secrets to configure.

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/polygraphvault-sync
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./syncer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=polygraphvault-sync
          cache-to: type=gha,mode=max,scope=polygraphvault-sync
